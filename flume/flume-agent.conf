# ─────────────────────────────────────────────
#  Flume Agent: Nginx access.log → HDFS
# ─────────────────────────────────────────────

agent.sources = nginx-source
agent.channels = mem-channel
agent.sinks = hdfs-sink

# ── Source: tail Nginx access.log ────────────
agent.sources.nginx-source.type = exec
agent.sources.nginx-source.command = tail -F /var/log/nginx/app_access.log
agent.sources.nginx-source.channels = mem-channel
agent.sources.nginx-source.restart = true
agent.sources.nginx-source.restartThrottle = 5000
agent.sources.nginx-source.interceptors = ts
agent.sources.nginx-source.interceptors.ts.type = timestamp

# ── Channel: in-memory buffer ────────────────
agent.channels.mem-channel.type = memory
agent.channels.mem-channel.capacity = 10000
agent.channels.mem-channel.transactionCapacity = 1000

# ── Sink: HDFS ───────────────────────────────
agent.sinks.hdfs-sink.type = hdfs
agent.sinks.hdfs-sink.channel = mem-channel
agent.sinks.hdfs-sink.hdfs.path = hdfs://namenode:9000/logs/spotify/%Y-%m-%d
agent.sinks.hdfs-sink.hdfs.filePrefix = access
agent.sinks.hdfs-sink.hdfs.fileSuffix = .log
agent.sinks.hdfs-sink.hdfs.fileType = DataStream
agent.sinks.hdfs-sink.hdfs.writeFormat = Text
agent.sinks.hdfs-sink.hdfs.rollInterval = 120
agent.sinks.hdfs-sink.hdfs.rollSize = 5242880
agent.sinks.hdfs-sink.hdfs.rollCount = 0
agent.sinks.hdfs-sink.hdfs.batchSize = 100
agent.sinks.hdfs-sink.hdfs.minBlockReplicas = 1
