<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Spotify Analytics{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #191414;
            --bg-card: #282828;
            --bg-hover: #333333;
            --green: #1DB954;
            --green-dark: #1aa34a;
            --text: #FFFFFF;
            --text-secondary: #B3B3B3;
            --text-muted: #727272;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Nav ─────────────────────────── */
        nav {
            background: #000;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 32px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--green);
            text-decoration: none;
        }

        nav .links {
            display: flex;
            gap: 24px;
        }

        nav .links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.2s;
        }

        nav .links a:hover,
        nav .links a.active {
            color: var(--text);
        }

        /* ── Layout ──────────────────────── */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* ── Cards ───────────────────────── */
        .card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 24px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        /* ── Stat cards ──────────────────── */
        .stat-card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--green);
        }

        .stat-card .label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* ── Buttons ─────────────────────── */
        .btn {
            background: var(--green);
            color: #000;
            border: none;
            border-radius: 500px;
            padding: 12px 32px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover {
            background: var(--green-dark);
            transform: scale(1.02);
        }

        .btn-sm {
            padding: 6px 16px;
            font-size: 0.8rem;
        }

        /* ── Inputs ──────────────────────── */
        .search-input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 500px;
            border: none;
            background: var(--bg-card);
            color: var(--text);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-input:focus {
            outline: 2px solid var(--green);
        }

        /* ── Tables ──────────────────────── */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--bg-hover);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
        }

        tr:hover {
            background: var(--bg-hover);
        }

        /* ── Popularity bar ──────────────── */
        .pop-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            height: 6px;
            width: 100px;
            display: inline-block;
            vertical-align: middle;
        }

        .pop-bar-fill {
            background: var(--green);
            height: 100%;
            border-radius: 4px;
        }

        /* ── Flash messages ──────────────── */
        .flash {
            background: var(--bg-card);
            border-left: 4px solid var(--green);
            padding: 12px 20px;
            margin-bottom: 16px;
            border-radius: 4px;
        }

        /* ── Section titles ──────────────── */
        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        /* ── Responsive ──────────────────── */
        @media (max-width: 768px) {
            nav { padding: 12px 16px; gap: 16px; }
            .container { padding: 16px; }
            .card-grid { grid-template-columns: 1fr; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav>
        <a href="/" class="logo">Spotify Analytics</a>
        <div class="links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a>
            <a href="/search" class="{% if '/search' in request.path %}active{% endif %}">Search</a>
            <a href="/upload" class="{% if '/upload' in request.path or '/personal' in request.path %}active{% endif %}">Upload</a>
        </div>
    </nav>

    <div class="container">
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for msg in messages %}
        <div class="flash">{{ msg }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
